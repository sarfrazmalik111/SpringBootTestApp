<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Title</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
  	<script th:src="@{/js/jquery.min.js}"></script>
  	<script th:src="@{/js/popper.min.js}"></script>
  	<script th:src="@{/js/bootstrap.min.js}"></script>
</head>
<body>
<div class="container register mt-5">
    <div class="row">
        <div class="col-lg-4 col-md-4 register-left">
            <img th:src="@{/images/paytm.svg}" style="width: 50%;"/>
            <p class="mt-5">You are 30 seconds away from earning your own money!</p>
        </div>
        <div class="col-lg-8 register-right">
            <div class="tab-content" id="myTabContent">
                <div class="tab-pane fade show active" id="home" role="tabpanel" aria-labelledby="home-tab">
                    <h3 class="register-heading">Welcome to Paytm Payment</h3>
                    <div class="row register-form">
                        <div class="col-md-10">
                        	<form th:action="@{/paytm/payment}" th:object="${paytm}" method="POST">
                            <div class="form-group">
                                <input type="text" class="form-control" placeholder="Customer ID" th:field="*{customerId}" />
                                <span th:if="${#fields.hasErrors('customerId')}" th:errors="*{customerId}">CustomerId Error</span>
                            </div>
                            <div class="form-group">
                                <input type="text" class="form-control" placeholder="Amount" th:field="*{txnAmount}" />
                                <span th:if="${#fields.hasErrors('txnAmount')}" th:errors="*{txnAmount}">Amount Error</span>
                            </div>
                            <button type="submit" class="btn btn-primary">Pay with Paytm</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
