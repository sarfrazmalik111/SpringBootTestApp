<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="pages/mobile_store/a_head" />
<body>
<div th:replace="pages/mobile_store/a_header"></div>
    <section id="categories-container" class="container">
        <div id="empty-div"></div>
        <div class="card">
            <div class="card-body">
              <div class="display-flex">
              	<div class="flex90">
              		<h4 class="card-title">Categories</h4>
              	</div>
                  <div class="width150">
              		<a th:href="@{/mobile-store/add-category}"><button class="btn btn-success">Add Category</button></a>
              	</div>
              </div>
              <table class="table table-striped table-bordered">
                <thead>
                  <tr>
                      <th>Name</th>
                      <th>Description</th>
                      <th>Image</th>
                      <th>Action</th>
                  </tr>
                </thead>
                <tbody>
                    <tr th:each="cat: ${categories}">
                        <td th:text="${cat.name}" />
                        <td th:text="${cat.description}" />
                        <td><img style="height: 100px;" th:src="${cat.logoPath}" /></td>
                        <td class="text-center">
                            <a th:href="@{/mobile-store/edit-category/}+${cat.id}"><button class="btn btn-success">Edit</button></a>
                            <a th:href="@{/mobile-store/delete-category/}+${cat.id}" onclick="return confirm('Are you sure, you want to Delete?')">
                                <button class="btn btn-danger">Delete</button></a>
                        </td>
                    </tr>
                </tbody>
              </table>  
            </div>
        </div>
    </section>
<footer th:replace="pages/mobile_store/a_footer"></footer>
</body>
</html>
