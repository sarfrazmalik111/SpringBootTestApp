<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="pages/mobile_store/a_head" />
<body>
<div th:replace="pages/mobile_store/a_header"></div>
    <section id="products-container" class="container">
        <div id="empty-div"></div>
        <div class="card">
            <div class="card-body">
            	<div class="display-flex">
	              	<div class="flex90">
	              		<h4 class="card-title">Mobiles</h4>
	              	</div>
	              	<div class="width150">
	              		<a th:href="@{/mobile-store/add-mobile}"><button class="btn btn-success">Add Mobile</button></a>
	              	</div>
                </div>
              <table class="table table-striped table-bordered">
                <thead>
                  <tr>
                      <th>Name</th>
                      <th>Price</th>
                      <th>Description</th>
                      <th>Image</th>
                      <th>Action</th>
                  </tr>
                </thead>
                <tbody>
                    <tr th:each="mobile: ${mobiles}">
                        <td th:text="${mobile.name}" />
                        <td th:text="${mobile.price}" />
                        <td th:text="${mobile.description}" />
                        <td><img style="height: 100px;" th:src="${mobile.logoPath}" /></td>
                        <td class="text-center">
                            <a th:href="@{/mobile-store/edit-mobile/}+${mobile.id}"><button class="btn btn-success">Edit</button></a>
                            <a th:href="@{/mobile-store/delete-mobile/}+${mobile.id}" onclick="return confirm('Are you sure, you want to Delete?')">
                                <button class="btn btn-danger">Delete</button></a>
                        </td>
                    </tr>
                </tbody>
              </table>  
            </div>
        </div>
    </section>
<footer th:replace="pages/mobile_store/a_footer"></footer>
</body>
</html>
